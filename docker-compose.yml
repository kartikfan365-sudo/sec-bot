version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: security_bot_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  bot:
    build: .
    container_name: security_bot_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/discord-sec-bot
      - PORT=5000
      - DASHBOARD_URL=http://localhost:5000
      # Inherits these from the host environment/file
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY}
    depends_on:
      - mongo

volumes:
  mongo-data:
